name: clawscibois

services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEBSITE_PORT:-3000}:${WEBSITE_PORT:-3000}"
      - "3001:3001"
      - "4096:4096"
    volumes:
      - ./volumes/clawscibois_data:/workspace
    env_file:
      - path: .env
        required: false
    environment:
      WEBSITE_PORT: "3000"
      DISCORD_BOT_PORT: "3001"
      OPENCODE_SERVE_PORT: "4096"
      OPENCODE_CORS: ${OPENCODE_CORS:-http://localhost:${WEBSITE_PORT:-3000}}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_URL: ${OPENCODE_URL:-http://127.0.0.1:4096}