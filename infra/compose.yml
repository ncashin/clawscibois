name: clawscibois

services:
  workspace:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "${WEBSITE_PORT:-3000}:${WEBSITE_PORT:-3000}"
      - "${DISCORD_BOT_PORT:-3001}:${DISCORD_BOT_PORT:-3001}"
    restart: unless-stopped
    volumes:
      # Use a Docker-managed named volume (ext4 inside the VM) rather than a
      # host bind mount. Bind mounts on macOS go through grpcfuse which does
      # not enforce Linux uid/perm semantics the way we need for the agent
      # sandbox (root-owned 755 dirs become writable by non-root users).
      - clawscibois_workspace:/workspace
    env_file:
      - path: ../.env
        required: false
    environment:
      WEBSITE_PORT: "3000"
      DISCORD_BOT_PORT: "3001"
      OPENCODE_URL: "http://127.0.0.1:4096"
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}

volumes:
  clawscibois_workspace:
    name: clawscibois_workspace
