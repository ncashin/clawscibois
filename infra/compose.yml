name: clawscibois

services:
  workspace:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "${WEBSITE_PORT:-3000}:${WEBSITE_PORT:-3000}"
      - "${DISCORD_BOT_PORT:-3001}:${DISCORD_BOT_PORT:-3001}"
    restart: unless-stopped
    volumes:
      - clawscibois_workspace:/workspace
    env_file:
      - path: ../.env
        required: false
    # Non-secret defaults go here. Everything secret (Discord tokens,
    # OPENCODE_API_KEY, OPENCODE_SERVER_PASSWORD) comes from the env_file
    # so the values never touch compose.yml or process args.
    environment:
      WEBSITE_PORT: "3000"
      DISCORD_BOT_PORT: "3001"
      OPENCODE_URL: "http://127.0.0.1:4096"

volumes:
  clawscibois_workspace:
    name: clawscibois_workspace
